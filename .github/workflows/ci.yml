name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: OPENCLAW-FINANCIAL-GUARDRAIL-SKILL/package-lock.json

      - name: Install
        working-directory: OPENCLAW-FINANCIAL-GUARDRAIL-SKILL
        run: npm install

      - name: Build
        working-directory: OPENCLAW-FINANCIAL-GUARDRAIL-SKILL
        run: npm run build

      - name: Test
        working-directory: OPENCLAW-FINANCIAL-GUARDRAIL-SKILL
        run: npm run test
